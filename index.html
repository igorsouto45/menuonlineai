    <!-- Structured Data - FAQ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "O que é um cardápio digital?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Um cardápio digital é uma versão online do menu do seu restaurante, acessível pelo celular através de um link ou QR Code. Com o MENU AI, seus clientes podem ver os produtos, escolher variações e adicionais, e enviar o pedido diretamente para o seu WhatsApp."
          }
        },
        {
          "@type": "Question",
          "name": "Preciso de um aplicativo para usar o cardápio digital?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Não! O cardápio digital do MENU AI funciona direto no navegador do celular. Seus clientes não precisam baixar nenhum aplicativo para fazer pedidos."
          }
        },
        {
          "@type": "Question",
          "name": "O MENU AI cobra taxa por pedido?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Não! O MENU AI cobra apenas uma mensalidade fixa, sem taxas por pedido. Diferente de marketplaces como iFood, você não paga comissão sobre as vendas."
          }
        },
        {
          "@type": "Question",
          "name": "Como recebo os pedidos dos clientes?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Os pedidos chegam direto no WhatsApp do seu restaurante, já formatados e organizados com todos os itens, variações, adicionais e endereço de entrega."
          }
        }
      ]
    }
    </script>
